<!DOCTYPE html>
<html lang=en>
<head>
    <title>Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

        <button class="tablinks" onclick="openTab(event, 'tab3')">Tab 3</button>

    <script src="script.js"></script>

</html>
