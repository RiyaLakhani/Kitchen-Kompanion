<!DOCTYPE html>
<html lang=en>

<head>
    <title>Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="tab1" class="tabcontent">Tab 1</div>
    <div id="tab2" class="tabcontent">Tab 2</div>
    <div id="tab3" class="tabcontent">Tab 3</div>

    <div id="tab4" class="tabcontent">
        <img src=turtle.png width=100 onClick="document.getElementById('thealert').style.display='block';"><br>

        <div id="thealert" class="alert">
            <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
            Hello
        </div>

    </div>
    <div id="tab5" class="tabcontent">
        <form>
            <p>First select:</p>
            <input type="radio" id="choice1" name="selection1">
            <label for="choice1">Do this</label><br>
            <input type="radio" id="choice2" name="selection1">
            <label for="choice2">Or this</label><br>

            <p>Second select: </p>
            <select id="selection2">
                <option value="choice1" selected>Apple</option>
                <option value="choice2">Choice 2</option>
            </select>
        </form><br><br>


        <button onclick="displayForm(event)">Click Me</button>
        <div id="selections"></div>
    </div>
    <div id="tab6" class="tabcontent">Tab 6</div>

    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'tab1')">Tab 1</button>
        <button class="tablinks" onclick="openTab(event, 'tab2')">Tab 2</button>
        <button class="tablinks" onclick="openTab(event, 'tab3')">Tab 3</button>
        <button class="tablinks" onclick="openTab(event, 'tab4')">Profile</button>
        <button class="tablinks" onclick="openTab(event, 'tab5')">Choices</button>
        <button class="tablinks" onclick="openTab(event, 'tab6')">Tab 6</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
